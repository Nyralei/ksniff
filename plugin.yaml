name: "sniff"
shortDesc: "Capture network traffic from a pod container"
longDesc: >
  Perform network sniffing on a container running in a Kubernetes cluster.
  Pipes tcpdump output to Wireshark (live) or to a local .pcap file.
example: "kubectl sniff busybox-sleep -n default --mode ephemeral -o /tmp/out.pcap"
command: "./kubectl-sniff"
flags:
  - name: "namespace"
    shorthand: "n"
    desc: "Namespace of the target pod (optional)"
  - name: "container"
    shorthand: "c"
    desc: "Container name within the pod (optional, defaults to first container)"
  - name: "interface"
    shorthand: "i"
    desc: "Network interface to capture on (optional, default: any)"
  - name: "filter"
    shorthand: "f"
    desc: "tcpdump capture filter expression (optional)"
  - name: "output-file"
    shorthand: "o"
    desc: "Write captured packets to this local file instead of opening Wireshark (use '-' for stdout)"
  - name: "mode"
    desc: "Sniffing mode: upload (default), ephemeral, or privileged"
  - name: "tcpdump-image"
    desc: "Container image providing tcpdump (optional, used by ephemeral and privileged modes)"
  - name: "local-tcpdump-path"
    shorthand: "l"
    desc: "Path to a local static-tcpdump binary (optional, upload mode only)"
  - name: "remote-tcpdump-path"
    shorthand: "r"
    desc: "Remote path to upload the static-tcpdump binary to (optional, upload mode only)"
  - name: "image"
    desc: "Privileged container image (optional, privileged mode only)"
  - name: "socket"
    desc: "Container runtime socket path (optional, privileged mode only)"
  - name: "serviceaccount"
    shorthand: "s"
    desc: "Service account for the privileged pod (optional, privileged mode only)"
  - name: "context"
    shorthand: "x"
    desc: "kubectl context to use (optional)"
  - name: "pod-creation-timeout"
    desc: "How long to wait for the sniffer pod/container to start (optional, default: 1m)"
  - name: "verbose"
    shorthand: "v"
    desc: "Enable debug logging (optional)"
