version: "2"
linters:
  enable:
    - gocritic
    - revive
  disable:
    - exhaustruct
    - varnamelen
    - wrapcheck
  settings:
    revive:
      rules:
        - name: exported
          disabled: true
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - errcheck
        path: _test.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - ksniff
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
