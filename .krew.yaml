apiVersion: krew.googlecontainertools.github.com/v1alpha2
kind: Plugin
metadata:
  name: sniff
spec:
  version: {{ .TagName }}
  homepage: https://github.com/nyralei/ksniff
  platforms:
  - {{ addURIAndSha "https://github.com/nyralei/ksniff/releases/download/{{ .TagName }}/kubectl-sniff_darwin_amd64.tar.gz" .TagName }}
    bin: kubectl-sniff
    files:
    - from: kubectl-sniff
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: amd64
  - {{ addURIAndSha "https://github.com/nyralei/ksniff/releases/download/{{ .TagName }}/kubectl-sniff_darwin_arm64.tar.gz" .TagName }}
    bin: kubectl-sniff
    files:
    - from: kubectl-sniff
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: darwin
        arch: arm64
  - {{ addURIAndSha "https://github.com/nyralei/ksniff/releases/download/{{ .TagName }}/kubectl-sniff_linux_amd64.tar.gz" .TagName }}
    bin: kubectl-sniff
    files:
    - from: kubectl-sniff
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: amd64
  - {{ addURIAndSha "https://github.com/nyralei/ksniff/releases/download/{{ .TagName }}/kubectl-sniff_linux_arm64.tar.gz" .TagName }}
    bin: kubectl-sniff
    files:
    - from: kubectl-sniff
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: linux
        arch: arm64
  - {{ addURIAndSha "https://github.com/nyralei/ksniff/releases/download/{{ .TagName }}/kubectl-sniff_windows_amd64.zip" .TagName }}
    bin: kubectl-sniff.exe
    files:
    - from: kubectl-sniff.exe
      to: .
    - from: LICENSE
      to: .
    selector:
      matchLabels:
        os: windows
        arch: amd64
  shortDescription: Capture pod network traffic using tcpdump and wireshark
  caveats: |
    This plugin needs the following programs:
    * wireshark (optional, used for live capture)

    Ephemeral container mode (default) requires Kubernetes 1.25+ and
    'update' permission on the 'pods/ephemeralcontainers' subresource.
  description: |
    When working with micro-services, many times it's very helpful to get a
    capture of the network activity between your micro-service and its
    dependencies.

    ksniff adds a tcpdump ephemeral container to the target pod and pipes its
    output to Wireshark for smooth network debugging. No modification to the
    target container is required.

    Usage:
      kubectl sniff <POD_NAME> [-n namespace] [-c container] [-i interface]
                               [-f filter] [-o output-file] [--mode ephemeral]
