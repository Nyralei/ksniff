name: Build helper image

on:
  workflow_call:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - images/ksniff-helper/**

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Set image tag
        run: echo "IMAGE=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/ksniff-helper:latest" >> $GITHUB_ENV

      - uses: docker/build-push-action@v6
        with:
          context: images/ksniff-helper
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: ${{ env.IMAGE }}
