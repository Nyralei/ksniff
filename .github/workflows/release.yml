name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: ~> v2
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_VERSIONED=ghcr.io/${OWNER}/ksniff-tcpdump:${{ github.ref_name }}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=ghcr.io/${OWNER}/ksniff-tcpdump:latest" >> $GITHUB_ENV

      - name: Build and push ksniff-tcpdump image
        uses: docker/build-push-action@v6
        with:
          context: images/ksniff-tcpdump
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ${{ env.IMAGE_VERSIONED }}
            ${{ env.IMAGE_LATEST }}

      - name: Set helper image tags
        run: |
          OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "HELPER_VERSIONED=ghcr.io/${OWNER}/ksniff-helper:${{ github.ref_name }}" >> $GITHUB_ENV
          echo "HELPER_LATEST=ghcr.io/${OWNER}/ksniff-helper:latest" >> $GITHUB_ENV

      - name: Build and push ksniff-helper image
        uses: docker/build-push-action@v6
        with:
          context: images/ksniff-helper
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          push: true
          tags: |
            ${{ env.HELPER_VERSIONED }}
            ${{ env.HELPER_LATEST }}
