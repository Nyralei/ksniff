name: e2e

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-image:
    uses: ./.github/workflows/build-tcpdump-image.yml
    permissions:
      packages: write

  k3d:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: AbsaOSS/k3d-action@v2
        name: "Create single-node cluster"
        with:
          cluster-name: "test-cluster-1"
          args: --agents 1

      - name: Deploy test pod
        run: |
          kubectl config use-context k3d-test-cluster-1
          kubectl create -f .github/workflows/assets/busybox-pod.yaml
          kubectl wait --for=condition=Ready pod/busybox-sleep --timeout=120s

      - name: Build
        run: make linux

      - name: Run ksniff ephemeral mode
        run: |
          kubectl config use-context k3d-test-cluster-1
          timeout 90 ./kubectl-sniff busybox-sleep --mode ephemeral --namespace default --output-file /tmp/output-ephem.pcap || true
          if [ ! -f /tmp/output-ephem.pcap ]; then
            echo "PCAP not created (ephemeral mode)"
            exit 1
          fi

      - if: failure()
        name: Debug pod state
        run: |
          kubectl config use-context k3d-test-cluster-1
          kubectl get pods
          kubectl get events

  minikube-docker:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Minikube
        uses: medyagh/setup-minikube@v0.0.19
        with:
          kubernetes-version: v1.31.0
          driver: docker
          wait: all
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy test pod
        run: |
          kubectl create -f .github/workflows/assets/busybox-pod.yaml
          kubectl wait --for=condition=Ready pod/busybox-sleep --timeout=120s

      - name: Build
        run: make linux

      - name: Run ksniff ephemeral mode
        run: |
          timeout 90 ./kubectl-sniff busybox-sleep --mode ephemeral --namespace default --output-file /tmp/output-ephem.pcap || true
          if [ ! -f /tmp/output-ephem.pcap ]; then
            echo "PCAP not created (ephemeral mode)"
            exit 1
          fi

      - if: failure()
        name: Debug pod state
        run: |
          kubectl get pods
          kubectl get events

  minikube-crio:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Minikube
        uses: medyagh/setup-minikube@v0.0.19
        with:
          kubernetes-version: v1.31.0
          driver: docker
          container-runtime: cri-o
          wait: all
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy test pod
        run: |
          kubectl create -f .github/workflows/assets/busybox-pod.yaml
          kubectl wait --for=condition=Ready pod/busybox-sleep --timeout=120s

      - name: Build
        run: make linux

      - name: Run ksniff ephemeral mode
        run: |
          timeout 90 ./kubectl-sniff busybox-sleep --mode ephemeral --namespace default --output-file /tmp/output-ephem.pcap || true
          if [ ! -f /tmp/output-ephem.pcap ]; then
            echo "PCAP not created (ephemeral mode)"
            exit 1
          fi

      - if: failure()
        name: Debug pod state
        run: |
          kubectl get pods
          kubectl get events
