name: k3s-e2e

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: images/ksniff-tcpdump
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/nyralei/ksniff-tcpdump:latest

  e2e:
    needs: build-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: AbsaOSS/k3d-action@v2
        name: "Create single-node cluster"
        with:
          cluster-name: "test-cluster-1"
          args: --agents 1

      - name: Deploy test pod
        run: |
          kubectl config use-context k3d-test-cluster-1
          kubectl create -f .github/workflows/assets/busybox-pod.yaml
          kubectl wait --for=condition=Ready pod/busybox-sleep

      - name: Build
        run: make linux

      - name: Run ksniff ephemeral mode
        run: |
          kubectl config use-context k3d-test-cluster-1
          sleep 60 && pkill kubectl-sniff &
          set +e
          ./kubectl-sniff busybox-sleep --mode ephemeral --namespace default --output-file /tmp/output-ephem.pcap
          set -e
          if [ ! -f /tmp/output-ephem.pcap ]; then
            echo "PCAP not created (ephemeral mode)"
            exit 1
          fi

      - if: failure()
        name: Debug pod state
        run: |
          kubectl config use-context k3d-test-cluster-1
          kubectl get pods
          kubectl get events
